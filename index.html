<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaling Minds — Client Portal</title>
<meta name="theme-color" content="#1B4332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#1B4332;--green-light:#2D6A4F;--green-muted:#40916C;--gold:#B8860B;--gold-light:#D4A017;--cream:#D4C5A9;--cream-light:#F5F0E8;--cream-bg:#FAF8F4;--white:#FFFFFF;--text:#1a1a1a;--text-muted:#6b6b6b;--border:#e0dbd2;--check-green:#2D6A4F;--shadow:0 2px 12px rgba(27,67,50,0.08);--shadow-lg:0 8px 32px rgba(27,67,50,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream-bg);color:var(--text);min-height:100vh;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--green);padding:20px;}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;width:100%;box-shadow:var(--shadow-lg);}
.login-logo{height:80px;margin-bottom:24px;}
.login-card h1{font-family:'DM Serif Display',serif;font-size:28px;color:var(--green);margin-bottom:8px;}
.login-card p{color:var(--text-muted);font-size:14px;margin-bottom:32px;line-height:1.5;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;border:1px solid var(--border);border-radius:12px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.2s;}
.google-btn:hover{box-shadow:var(--shadow);background:var(--cream-light);}
.login-footer{margin-top:24px;font-size:11px;color:var(--text-muted);}
.loading-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.header{background:var(--green);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:14px;}
.header-logo{height:44px;border-radius:4px;}
.header h1{font-family:'DM Serif Display',serif;color:var(--cream-light);font-size:21px;font-weight:400;}
.header-subtitle{color:var(--cream);font-size:13px;opacity:0.8;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:12px;}
.streak-badge{background:rgba(184,134,11,0.2);border:1px solid var(--gold);color:var(--gold-light);padding:7px 14px;border-radius:24px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);cursor:pointer;}
.signout-btn{background:none;border:1px solid rgba(212,197,169,0.3);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.15s;}
.signout-btn:hover{background:rgba(255,255,255,0.1);}
.nav-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 28px;overflow-x:auto;}
.nav-tab{padding:13px 20px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
.nav-tab:hover{color:var(--green);}
.nav-tab.active{color:var(--green);border-bottom-color:var(--gold);}
.main{max-width:960px;margin:0 auto;padding:28px 20px 80px;}
.quote-banner{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;}
.quote-banner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold);}
.quote-text{font-family:'DM Serif Display',serif;font-size:18px;color:var(--green);line-height:1.5;margin-bottom:6px;}
.quote-attr{font-size:13px;color:var(--text-muted);font-weight:500;}
.date-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.date-header h2{font-family:'DM Serif Display',serif;font-size:26px;color:var(--green);}
.date-header .date-sub{font-size:13px;color:var(--text-muted);margin-top:3px;}
.progress-ring-container{display:flex;align-items:center;gap:10px;}
.progress-text{font-size:14px;font-weight:600;color:var(--green);}
.habits-list{display:flex;flex-direction:column;gap:10px;}
.habit-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:14px;transition:all 0.2s;cursor:pointer;}
.habit-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.habit-card.checked{border-color:var(--check-green);background:linear-gradient(135deg,rgba(45,106,79,0.04),rgba(45,106,79,0.02));}
.habit-card.checked .habit-check{background:var(--check-green);border-color:var(--check-green);}
.habit-card.checked .habit-check svg{opacity:1;}
.habit-card.checked .habit-name{color:var(--green-muted);}
.habit-check{width:34px;height:34px;min-width:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);}
.habit-check svg{width:16px;height:16px;stroke:white;opacity:0;transition:opacity 0.2s;}
.habit-info{flex:1;}.habit-name{font-size:15px;font-weight:600;transition:color 0.2s;}
.habit-desc{font-size:12px;color:var(--text-muted);margin-top:2px;}
.habit-category{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 9px;border-radius:6px;white-space:nowrap;}
.cat-leadership{background:#E8F5E9;color:#1B5E20;}.cat-communication{background:#FFF3E0;color:#E65100;}.cat-wellbeing{background:#E3F2FD;color:#0D47A1;}.cat-relationships{background:#F3E5F5;color:#6A1B9A;}.cat-productivity{background:#FBE9E7;color:#BF360C;}.cat-mindset{background:#E0F2F1;color:#004D40;}.cat-custom{background:var(--cream-light);color:var(--green);}
.habit-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.2s;}
.habit-card:hover .habit-actions{opacity:1;}
.habit-action-btn{width:30px;height:30px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;}
.habit-action-btn:hover{background:var(--cream-light);color:var(--text);}
.habit-action-btn.delete:hover{color:#c0392b;background:#fde8e8;}
.week-grid{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow-x:auto;}
.week-header-row{display:grid;grid-template-columns:180px repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--cream-light);min-width:600px;}
.week-header-cell{padding:11px 6px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);}
.week-header-cell.today-col{color:var(--green);background:rgba(45,106,79,0.08);}
.week-header-cell:first-child{text-align:left;padding-left:18px;}
.week-row{display:grid;grid-template-columns:180px repeat(7,1fr);border-bottom:1px solid var(--border);min-width:600px;}
.week-row:last-child{border-bottom:none;}
.week-habit-name{padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;}
.week-cell{display:flex;align-items:center;justify-content:center;padding:8px;}
.week-cell.today-col{background:rgba(45,106,79,0.04);}
.week-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.week-dot:hover{border-color:var(--green-muted);}
.week-dot.filled{background:var(--check-green);border-color:var(--check-green);}
.week-dot.filled svg{stroke:white;width:13px;height:13px;}
.week-dot.future{opacity:0.3;pointer-events:none;}
.add-habit-btn{width:100%;padding:14px;border:2px dashed var(--border);border-radius:12px;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;}
.add-habit-btn:hover{border-color:var(--green-muted);color:var(--green);background:rgba(45,106,79,0.03);}
.modal-overlay{position:fixed;inset:0;background:rgba(27,67,50,0.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:16px;width:480px;max-width:92vw;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--green);}
.modal-close{width:34px;height:34px;border:none;background:var(--cream-light);border-radius:50%;cursor:pointer;font-size:18px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--cream);}
.modal-body{padding:20px 24px 24px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:7px;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);transition:border-color 0.2s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green-muted);}
.form-textarea{resize:vertical;min-height:68px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:11px 22px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:var(--green);color:var(--cream-light);}
.btn-primary:hover{background:var(--green-light);}
.btn-secondary{background:var(--cream-light);color:var(--text);}
.btn-secondary:hover{background:var(--cream);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;text-align:center;}
.stat-value{font-family:'DM Serif Display',serif;font-size:34px;color:var(--green);}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:3px;font-weight:500;}
.empty-state{text-align:center;padding:56px 20px;}
.empty-state .icon{width:60px;height:60px;background:var(--cream-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px;}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--green);margin-bottom:6px;}
.empty-state p{color:var(--text-muted);font-size:14px;max-width:340px;margin:0 auto;}
.coach-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:28px;display:flex;gap:24px;align-items:flex-start;}
.coach-card-content{flex:1;}.coach-card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:8px;}
.coach-card-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--green);margin-bottom:2px;}
.coach-card-title{font-size:13px;color:var(--text-muted);margin-bottom:14px;}
.coach-card-contacts{display:flex;flex-direction:column;gap:6px;}
.coach-card-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
.coach-card-row a{color:var(--green);text-decoration:none;font-weight:500;}
.coach-card-row a:hover{text-decoration:underline;}
.coach-card-row svg{width:16px;height:16px;color:var(--green-muted);flex-shrink:0;}
.coach-card-divider{width:1px;background:var(--border);align-self:stretch;margin:0 8px;}
/* HOME */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.home-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;}
.home-card h3{font-family:'DM Serif Display',serif;font-size:17px;color:var(--green);margin-bottom:10px;}
.schedule-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--green);color:var(--cream-light);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.schedule-btn:hover{background:var(--green-light);}
.engagement-dates{display:flex;gap:20px;font-size:13px;color:var(--text-muted);}
.engagement-dates strong{display:block;font-size:16px;color:var(--text);margin-top:2px;}
.progress-bar-wrap{background:var(--cream-light);border-radius:8px;height:10px;overflow:hidden;margin-top:8px;}
.progress-bar-fill{height:100%;border-radius:8px;transition:width 0.4s;}
/* COACH */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px;}
.client-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;}
.client-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.client-card.inactive{border-left:4px solid #c0392b;}
.client-avatar{width:42px;height:42px;border-radius:50%;margin-right:12px;border:2px solid var(--cream);}
.client-top{display:flex;align-items:center;margin-bottom:14px;}
.client-name{font-weight:700;font-size:15px;color:var(--green);}
.client-email{font-size:11px;color:var(--text-muted);}
.client-stats{display:flex;gap:16px;font-size:12px;color:var(--text-muted);}
.client-stat-val{font-weight:700;font-size:16px;color:var(--text);display:block;}
.inactive-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#fde8e8;color:#c0392b;padding:2px 8px;border-radius:4px;margin-left:8px;}
.back-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--green);cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-bottom:20px;}
.back-btn:hover{color:var(--green-light);}
.export-btn{background:var(--green);color:var(--cream-light);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all 0.2s;}
.export-btn:hover{background:var(--green-light);}
.footer{text-align:center;padding:22px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:40px;}
@media(max-width:700px){
  .header{padding:16px 14px;}.header h1{font-size:17px;}.header-logo{height:36px;}
  .streak-badge{font-size:11px;padding:5px 10px;}.nav-bar{padding:0 14px;}
  .main{padding:18px 14px 60px;}.stats-grid{grid-template-columns:1fr;}
  .habit-category{display:none;}.quote-banner{padding:18px 20px;}.quote-text{font-size:16px;}
  .coach-card{flex-direction:column;align-items:center;text-align:center;}
  .coach-card-contacts{align-items:center;}.coach-card-divider{width:100%;height:1px;margin:8px 0;}
  .login-card{padding:36px 24px;}.client-grid{grid-template-columns:1fr;}
  .home-grid{grid-template-columns:1fr;}
}
@keyframes checkPop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.habit-card.just-checked .habit-check{animation:checkPop 0.35s cubic-bezier(0.4,0,0.2,1);}
</style>
</head>

// HELPERS
function dailyQuote(){var t=new Date();return QUOTES[(t.getFullYear()*10000+(t.getMonth()+1)*100+t.getDate())%QUOTES.length];}
function dk(d){return d.toISOString().split('T')[0];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function weekDates(){var t=new Date(),day=t.getDay(),m=new Date(t);m.setDate(t.getDate()-((day+6)%7));var d=[];for(var i=0;i<7;i++){var x=new Date(m);x.setDate(m.getDate()+i);d.push(x);}return d;}
function isCoach(){return state.user&&COACH_EMAILS.indexOf(state.user.email)!==-1;}
function fmtDate(s){if(!s)return'—';var p=s.split('-');var d=new Date(p[0],p[1]-1,p[2]);return MN[d.getMonth()]+' '+d.getDate()+', '+p[0];}
function fmtShort(s){if(!s)return'—';var p=s.split('-');var d=new Date(p[0],p[1]-1,p[2]);return DS[d.getDay()]+', '+MN[d.getMonth()]+' '+d.getDate();}
function fmtDateTime(s){if(!s)return'—';var d;if(s.indexOf('T')!==-1){d=new Date(s);}else{var p=s.split('-');d=new Date(p[0],p[1]-1,p[2]);}var h=d.getHours(),m=d.getMinutes(),ampm=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;var mm=m<10?'0'+m:m;return MN[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+' at '+h+':'+mm+' '+ampm;}

function getStreak(data){
  var s=0,d=new Date();
  while(true){var k=dk(d),done=data.habits.filter(function(h){return data.completions[k]&&data.completions[k].indexOf(h.id)!==-1;});
  if(done.length===data.habits.length&&data.habits.length>0){s++;d.setDate(d.getDate()-1);}
  else if(s===0){d.setDate(d.getDate()-1);var yk=dk(d),yd=data.habits.filter(function(h){return data.completions[yk]&&data.completions[yk].indexOf(h.id)!==-1;});
  if(yd.length===data.habits.length&&data.habits.length>0){s++;d.setDate(d.getDate()-1);}else break;}else break;}return s;
}

function getCompletionRate(data){
  // Smart: only count days since first completion or start date
  var startDk=data.startDate||null;
  if(!startDk){var allDates=Object.keys(data.completions).filter(function(k){return(data.completions[k]||[]).length>0;}).sort();if(allDates.length>0)startDk=allDates[0];}
  if(!startDk||data.habits.length===0)return 0;
  var sp=startDk.split('-'),sd=new Date(sp[0],sp[1]-1,sp[2]),today=new Date(),days=Math.max(1,Math.floor((today-sd)/(1000*60*60*24))+1);
  if(days>90)days=90; // cap at 90
  var total=0,countDays=0;
  for(var i=0;i<days;i++){var d=new Date(today);d.setDate(d.getDate()-i);var k=dk(d),c=data.completions[k]||[];
    total+=data.habits.filter(function(h){return c.indexOf(h.id)!==-1;}).length;countDays++;}
  return Math.round((total/(data.habits.length*countDays))*100);
}

function getActiveDays(data){
  var startDk=data.startDate||null;
  if(!startDk){var allDates=Object.keys(data.completions).filter(function(k){return(data.completions[k]||[]).length>0;}).sort();if(allDates.length>0)startDk=allDates[0];}
  if(!startDk)return 0;
  var sp=startDk.split('-'),sd=new Date(sp[0],sp[1]-1,sp[2]);
  return Math.max(1,Math.floor((new Date()-sd)/(1000*60*60*24))+1);
}

function getLastActive(data){
  var dates=Object.keys(data.completions).sort(function(a,b){return b.localeCompare(a);});
  for(var i=0;i<dates.length;i++){if((data.completions[dates[i]]||[]).length>0)return dates[i];}return null;
}
function daysSince(s){if(!s)return 999;var p=s.split('-');return Math.floor((new Date()-new Date(p[0],p[1]-1,p[2]))/(1000*60*60*24));}

function engagementProgress(data){
  if(!data.startDate||!data.endDate)return null;
  var sp=data.startDate.split('-'),ep=data.endDate.split('-');
  var sd=new Date(sp[0],sp[1]-1,sp[2]),ed=new Date(ep[0],ep[1]-1,ep[2]),today=new Date();
  var total=Math.max(1,(ed-sd)/(1000*60*60*24)),elapsed=Math.max(0,(today-sd)/(1000*60*60*24));
  return Math.min(100,Math.round((elapsed/total)*100));
}

// FIREBASE
var saveTimeout=null;
function saveToCloud(){
  if(!state.user)return;clearTimeout(saveTimeout);
  saveTimeout=setTimeout(function(){
    db.collection('users').doc(state.user.uid).set({
      habits:state.data.habits,completions:state.data.completions,notes:state.data.notes||{},
      startDate:state.data.startDate||null,endDate:state.data.endDate||null,
      nextSession:state.data.nextSession||null,focusOfWeek:state.data.focusOfWeek||'',
      todos:state.data.todos||[],sessionPrep:state.data.sessionPrep||'',
      displayName:state.user.displayName||'',email:state.user.email||'',photoURL:state.user.photoURL||'',
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  },800);
}
function loadFromCloud(cb){
  if(!state.user)return;
  db.collection('users').doc(state.user.uid).get().then(function(doc){
    if(doc.exists){var d=doc.data();state.data.habits=d.habits||[];state.data.completions=d.completions||{};state.data.notes=d.notes||{};state.data.startDate=d.startDate||null;state.data.endDate=d.endDate||null;state.data.nextSession=d.nextSession||null;state.data.focusOfWeek=d.focusOfWeek||'';state.data.todos=d.todos||[];state.data.sessionPrep=d.sessionPrep||'';}
    if(cb)cb();
  }).catch(function(){if(cb)cb();});
}
function loadAllClients(cb){
  db.collection('users').get().then(function(snap){
    state.clients=[];
    snap.forEach(function(doc){var d=doc.data();
      if(COACH_EMAILS.indexOf(d.email)===-1){
        state.clients.push({uid:doc.id,displayName:d.displayName||'Unknown',email:d.email||'',photoURL:d.photoURL||'',
          habits:d.habits||[],completions:d.completions||{},notes:d.notes||{},startDate:d.startDate||null,endDate:d.endDate||null,
          nextSession:d.nextSession||null,focusOfWeek:d.focusOfWeek||'',todos:d.todos||[],sessionPrep:d.sessionPrep||''});
      }
    });if(cb)cb();
  }).catch(function(e){console.error(e);if(cb)cb();});
}
function saveClientFields(uid,fields){
  db.collection('users').doc(uid).set(fields,{merge:true}).then(function(){
    var c=state.clients.find(function(x){return x.uid===uid;});
    if(c){Object.keys(fields).forEach(function(k){c[k]=fields[k];});}
    if(state.selectedClient&&state.selectedClient.uid===uid){Object.keys(fields).forEach(function(k){state.selectedClient[k]=fields[k];});}
    render();
  });
}

function renderStats(today,data){
  var habits=data.habits;if(habits.length===0)return '<div class="empty-state"><div class="icon">📊</div><h3>No data yet</h3></div>';
  var activeDays=Math.min(90,getActiveDays(data)),days=[];
  for(var i=activeDays-1;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);days.push(dk(d));}
  var totalChecks=0,perfectDays=0;
  days.forEach(function(k){var c=data.completions[k]||[];var cnt=habits.filter(function(h){return c.indexOf(h.id)!==-1;}).length;totalChecks+=cnt;if(cnt===habits.length)perfectDays++;});
  var avgRate=activeDays>0?Math.round((totalChecks/(habits.length*activeDays))*100):0;
  var habitRates=habits.map(function(hb){var c=0;days.forEach(function(k){var co=data.completions[k]||[];if(co.indexOf(hb.id)!==-1)c++;});return{name:hb.name,category:hb.category,rate:activeDays>0?Math.round((c/activeDays)*100):0};}).sort(function(a,b){return b.rate-a.rate;});
  var h='<div style="margin-bottom:22px"><h2 style="font-family:\'DM Serif Display\',serif;font-size:26px;color:var(--green)">Progress</h2><div style="font-size:13px;color:var(--text-muted);margin-top:3px">Last '+activeDays+' day'+(activeDays!==1?'s':'')+'</div></div>';
  h+='<div class="stats-grid"><div class="stat-card"><div class="stat-value" style="color:'+(avgRate>=70?'var(--check-green)':avgRate>=40?'var(--gold)':'#c0392b')+'">'+avgRate+'%</div><div class="stat-label">Completion Rate</div></div>';
  h+='<div class="stat-card"><div class="stat-value">'+perfectDays+'</div><div class="stat-label">Perfect Days</div></div>';
  h+='<div class="stat-card"><div class="stat-value">'+totalChecks+'</div><div class="stat-label">Total Check-ins</div></div></div>';
  h+='<h3 style="font-family:\'DM Serif Display\',serif;font-size:18px;color:var(--green);margin-bottom:14px">By Habit</h3><div style="display:flex;flex-direction:column;gap:10px">';
  habitRates.forEach(function(hr){var cat=CATEGORIES.find(function(c){return c.id===hr.category;})||CATEGORIES[6];var bc=hr.rate>=70?'var(--check-green)':hr.rate>=40?'var(--gold)':'#c0392b';
    h+='<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div><span style="font-weight:600;font-size:14px">'+esc(hr.name)+'</span><span class="habit-category '+cat.cls+'" style="margin-left:8px">'+cat.label+'</span></div><span style="font-weight:700;color:var(--green)">'+hr.rate+'%</span></div><div style="background:var(--cream-light);border-radius:6px;height:7px;overflow:hidden"><div style="background:'+bc+';height:100%;width:'+hr.rate+'%;border-radius:6px;transition:width 0.4s"></div></div></div>';
  });h+='</div>';return h;
}

  // Session prep (read-only for coach)
  if(c.sessionPrep){
    h+='<div style="background:linear-gradient(135deg,rgba(184,134,11,0.08),rgba(184,134,11,0.03));border:1px solid var(--gold);border-radius:12px;padding:20px;margin-bottom:16px">';
    h+='<h3 style="font-family:\'DM Serif Display\',serif;font-size:17px;color:var(--gold);margin-bottom:8px">Session Prep (from client)</h3>';
    h+='<div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+esc(c.sessionPrep)+'</div></div>';
  }

  h+=renderStats(today,c);

  // Notes
  var nd=Object.keys(c.notes||{}).filter(function(k){return c.notes[k]&&c.notes[k].trim();}).sort(function(a,b){return b.localeCompare(a);});
  if(nd.length>0){
    h+='<h3 style="font-family:\'DM Serif Display\',serif;font-size:18px;color:var(--green);margin:28px 0 14px">Client Notes</h3><div style="display:flex;flex-direction:column;gap:10px">';
    nd.slice(0,10).forEach(function(k){
      h+='<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 22px;"><div style="font-weight:600;font-size:13px;color:var(--green);margin-bottom:6px">'+fmtShort(k)+'</div>';
      h+='<div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+esc(c.notes[k])+'</div></div>';
    });h+='</div>';
  }
  return h;
}

// COACH ACTIONS
function setCoachView(v){state.coachView=v;render();}
function selectClient(i){
  var sorted=state.clients.slice().sort(function(a,b){var aI=daysSince(getLastActive(a))>=INACTIVE_DAYS?0:1,bI=daysSince(getLastActive(b))>=INACTIVE_DAYS?0:1;if(aI!==bI)return aI-bI;return(a.displayName||'').localeCompare(b.displayName||'');});
  state.selectedClient=sorted[i];state.coachView='detail';render();
}
function refreshClients(){loadAllClients(function(){render();});}
function saveClientDatesUI(){
  var s=document.getElementById('client-start').value,e=document.getElementById('client-end').value;
  saveClientFields(state.selectedClient.uid,{startDate:s||null,endDate:e||null});
}
function saveClientNextSession(){
  var v=document.getElementById('client-nextsession').value;
  saveClientFields(state.selectedClient.uid,{nextSession:v||null});
}
function saveClientFocus(){
  var v=document.getElementById('client-focus').value;
  saveClientFields(state.selectedClient.uid,{focusOfWeek:v||''});
}
function addClientTodo(){
  var t=document.getElementById('new-todo-text').value.trim();if(!t)return;
  var l=document.getElementById('new-todo-link').value.trim();
  var todos=(state.selectedClient.todos||[]).slice();
  todos.push({id:'t'+Date.now(),text:t,link:l||'',done:false});
  saveClientFields(state.selectedClient.uid,{todos:todos});
}
function removeClientTodo(i){
  if(!confirm('Remove this to-do?'))return;
  var todos=(state.selectedClient.todos||[]).slice();
  todos.splice(i,1);
  saveClientFields(state.selectedClient.uid,{todos:todos});
}
function exportAllCSV(){
  var rows=[['Name','Email','Habits','Rate','Streak','Start','End','Last Active']];
  state.clients.forEach(function(c){rows.push([c.displayName,c.email,c.habits.length,getCompletionRate(c)+'%',getStreak(c),c.startDate||'',c.endDate||'',getLastActive(c)||'Never']);});
  dlCSV(rows,'scaling-minds-all-clients.csv');
}
function exportClientCSV(){
  var c=state.selectedClient;if(!c)return;
  var today=new Date(),ad=Math.min(90,getActiveDays(c)),days=[];for(var i=ad-1;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);days.push(dk(d));}
  var header=['Date'];c.habits.forEach(function(h){header.push(h.name);});var rows=[header];
  days.forEach(function(k){var row=[k];c.habits.forEach(function(h){var co=c.completions[k]||[];row.push(co.indexOf(h.id)!==-1?'Yes':'');});rows.push(row);});
  rows.push([]);rows.push(['Date','Note']);
  Object.keys(c.notes||{}).sort(function(a,b){return b.localeCompare(a);}).forEach(function(k){if(c.notes[k]&&c.notes[k].trim())rows.push([k,c.notes[k].replace(/[\n\r]+/g,' ')]);});
  dlCSV(rows,'scaling-minds-'+c.displayName.replace(/\s+/g,'-').toLowerCase()+'.csv');
}
function dlCSV(rows,fn){var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');var b=new Blob([csv],{type:'text/csv'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u);}

// CLIENT ACTIONS
function setView(v){state.view=v;render();}
function toggleHabit(id){var ts=dk(new Date());if(!state.data.completions[ts])state.data.completions[ts]=[];var arr=state.data.completions[ts],ix=arr.indexOf(id);if(ix===-1)arr.push(id);else arr.splice(ix,1);saveToCloud();render();if(ix===-1){setTimeout(function(){var card=document.getElementById('card-'+id);if(card){card.classList.add('just-checked');setTimeout(function(){card.classList.remove('just-checked');},400);}},10);}}
function toggleHabitDate(id,k){if(!state.data.completions[k])state.data.completions[k]=[];var arr=state.data.completions[k],ix=arr.indexOf(id);if(ix===-1)arr.push(id);else arr.splice(ix,1);saveToCloud();render();}
function openAddModal(){state.editingHabit=null;state.modalOpen=true;render();setTimeout(function(){var e=document.getElementById('habit-name');if(e)e.focus();},100);}
function openEditModal(id){state.editingHabit=id;state.modalOpen=true;render();}
function closeModal(){state.modalOpen=false;state.editingHabit=null;render();}
function closeModalOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}
function saveHabit(){var n=document.getElementById('habit-name').value.trim(),d=document.getElementById('habit-desc').value.trim(),c=document.getElementById('habit-cat').value;if(!n)return;if(state.editingHabit){var hb=state.data.habits.find(function(x){return x.id===state.editingHabit;});if(hb){hb.name=n;hb.desc=d;hb.category=c;}}else{state.data.habits.push({id:'h'+Date.now(),name:n,desc:d,category:c});}saveToCloud();closeModal();}
function deleteHabit(id){if(!confirm('Remove this habit?'))return;state.data.habits=state.data.habits.filter(function(h){return h.id!==id;});saveToCloud();render();}
function toggleTodo(i){var t=state.data.todos||[];if(t[i]){t[i].done=!t[i].done;saveToCloud();render();}}
function saveSessionPrep(val){state.data.sessionPrep=val;saveToCloud();}
function saveNote(k,val){if(!state.data.notes)state.data.notes={};state.data.notes[k]=val;saveToCloud();}
function deleteNote(k){if(!confirm('Delete this note?'))return;delete state.data.notes[k];saveToCloud();render();}

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(e){});});}
</script>
